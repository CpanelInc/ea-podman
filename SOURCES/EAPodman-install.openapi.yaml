---
components:
  schemas: {}
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
externalDocs:
  url: https://cpanel.net/developers/
info:
  contact:
    email: cs@cpanel.net
    name: WebPros International, LLC
    url: https://cpanel.net/support/
  description: UAPI accesses the cPanel interface's features. Use this API to access and modify cPanel
    account data and settings.
  license:
    name: cPanel License
    url: https://cpanel.net/legal-notices/
  termsOfService: https://cpanel.net/legal-notices/
  title: cPanel UAPI
  version: 11.136.0.0
openapi: 3.0.2
paths:
  /EAPodman/install:
    get:
      description: Install and start a rootless container for the caller. Synchronous, so installing an
        image that must be pulled can take a while.
      operationId: install
      parameters:
      - description: An EA4 container-based package name, or an arbitrary container name.
        in: query
        name: name
        required: true
        schema:
          example: myredis
          type: string
      - description: The container image. Required for an arbitrary name; omit for an EA4 package (which
          supplies its own).
        in: query
        name: image
        required: false
        schema:
          example: docker.io/library/redis:alpine
          type: string
      - description: A port inside the container to publish; repeatable (give cpuser_port more than once).
          The host port is assigned by the cPanel port authority.
        in: query
        name: cpuser_port
        required: false
        schema:
          items:
            example: 6379
            type: integer
          type: array
      - description: A KEY=VALUE environment pair; repeatable (give env more than once).
        in: query
        name: env
        required: false
        schema:
          items:
            example: TZ=UTC
            type: string
          type: array
      - description: 'Required to install an arbitrary (non-EA4-package) image, acknowledging the trust/reliability
          caveats.

          * `1` - Acknowledge and proceed.

          * `0` - Do not (default).'
        in: query
        name: accept_arbitrary_image_risk
        required: false
        schema:
          enum:
          - 0
          - 1
          example: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  apiversion:
                    description: The version of the API.
                    example: 3
                    type: integer
                  func:
                    description: The name of the method called.
                    type: string
                  module:
                    description: The name of the module called.
                    example: EAPodman
                    type: string
                  result:
                    properties:
                      data:
                        properties:
                          container_name:
                            description: The generated name of the installed container.
                            example: myredis.bob.01
                            type: string
                        type: object
                      errors:
                        description: List of errors if the API failed.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      messages:
                        description: List of messages generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      metadata:
                        properties: {}
                        type: object
                      status:
                        description: '* 1 - Success.

                          * 0 - Failed. Check the `errors` field for more details.'
                        enum:
                        - 0
                        - 1
                        example: 1
                        type: integer
                      warnings:
                        description: List of warnings generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                    type: object
                type: object
          description: HTTP Request was successful.
      summary: Install and start an ea-podman container
      tags:
      - EAPodman
      - ea-podman Containers
      x-codeSamples:
      - label: CLI
        lang: Shell
        source: "uapi --output=jsonpretty \\\n  --user=username \\\n  EAPodman \\\n  install \\\n  name='myredis'\
          \ \\\n  image='docker.io/library/redis:alpine' \\\n  cpuser_port='6379' \\\n  accept_arbitrary_image_risk='1'\n"
      - label: URL
        lang: HTTP
        source: https://hostname.example.com:2083/cpsess##########/execute/EAPodman/install?name=myredis&image=docker.io%2Flibrary%2Fredis%3Aalpine&cpuser_port=6379&accept_arbitrary_image_risk=1
      - label: LiveAPI Perl
        lang: Perl
        source: "use strict;\nuse Cpanel::LiveAPI ();\n\nmy $cpanel = Cpanel::LiveAPI->new();\n\nprint\
          \ \"Content-type: text/plain\\r\\n\\r\\n\";\n\nmy $response = $cpanel->uapi(\n        q/EAPodman/,\n\
          \        q/install/,\n        {\n            'name' => 'myredis',\n            'image' => 'docker.io/library/redis:alpine',\n\
          \            'cpuser_port' => '6379',\n            'accept_arbitrary_image_risk' => '1',\n \
          \       }\n);\n\nif ($response->{cpanelresult}{result}{status}) {\n    print to_json($response->{cpanelresult}{result}{data});\n\
          }\nelse {\n    print to_json($response->{cpanelresult}{result}{errors});\n}\n\n$cpanel->end();\n\
          \nsub to_json { require JSON; return JSON->new->pretty->encode($_[0]); }\n"
      - label: LiveAPI PHP
        lang: PHP
        source: "<?php\nrequire_once \"/usr/local/cpanel/php/cpanel.php\";\nheader('Content-Type: text/plain');\n\
          $cpanel = new CPANEL();\n\n$response = $cpanel->uapi(\n        'EAPodman',\n        'install',\n\
          \        array (\n            'name' => 'myredis',\n            'image' => 'docker.io/library/redis:alpine',\n\
          \            'cpuser_port' => '6379',\n            'accept_arbitrary_image_risk' => '1',\n \
          \       )\n);\n\nif ($response['cpanelresult']['result']['status']) {\n    print to_json($response['cpanelresult']['result']['data']);\n\
          }\nelse {\n    print to_json($response['cpanelresult']['result']['errors']);\n}\n\n$cpanel->end();\n\
          \nfunction to_json($data) { return json_encode($data, JSON_PRETTY_PRINT); }\n"
      x-cpanel-api-version: UAPI
      x-cpanel-available-version: ea-podman 1.0
      x-readonly: false
security:
- BasicAuth: []
servers:
- description: A server running cPanel.
  url: https://{host}:{port}/execute
  variables:
    host:
      default: cpanel-server.tld
      description: The hostname of a server running cPanel
    port:
      default: '2083'
      description: The cPanel port.
tags:
- description: The EAPodman module for UAPI.
  name: EAPodman
- description: Optional Applications / ea-podman Containers
  name: ea-podman Containers
x-tagGroups:
- name: Optional Applications
  tags:
  - ea-podman Containers
