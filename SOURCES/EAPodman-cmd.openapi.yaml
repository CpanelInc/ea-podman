---
components:
  schemas: {}
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
externalDocs:
  url: https://cpanel.net/developers/
info:
  contact:
    email: cs@cpanel.net
    name: WebPros International, LLC
    url: https://cpanel.net/support/
  description: UAPI accesses the cPanel interface's features. Use this API to access and modify cPanel
    account data and settings.
  license:
    name: cPanel License
    url: https://cpanel.net/legal-notices/
  termsOfService: https://cpanel.net/legal-notices/
  title: cPanel UAPI
  version: 11.136.0.0
openapi: 3.0.2
paths:
  /EAPodman/cmd:
    get:
      description: Run a non-interactive command inside the named container (no TTY, no shell assumed)
        and return its captured stdout, stderr, and exit code. An optional `cd` sets the working directory.
        Works on hardened (hidepid=2) hosts and for jailshell / CageFS accounts.
      operationId: cmd
      parameters:
      - description: The generated name of the container to act on.
        in: query
        name: container_name
        required: true
        schema:
          example: myredis.bob.01
          type: string
      - description: The command and its arguments, in order; repeatable (give arg more than once). At
          least one is required.
        in: query
        name: arg
        required: true
        schema:
          items:
            example: date
            type: string
          type: array
      - description: An optional working directory inside the container. When given, the command runs
          from that directory via the container's /bin/sh (cd DIR && exec ...); without it, no shell is
          used.
        in: query
        name: cd
        required: false
        schema:
          example: /tmp
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  apiversion:
                    description: The version of the API.
                    example: 3
                    type: integer
                  func:
                    description: The name of the method called.
                    type: string
                  module:
                    description: The name of the module called.
                    example: EAPodman
                    type: string
                  result:
                    properties:
                      data:
                        description: The exec'd command's captured output and exit status.
                        example:
                          exit_code: 0
                          stderr: ''
                          stderr_truncated: false
                          stdout: 'Mon Jan  1 00:00:00 UTC 2026

                            '
                          stdout_truncated: false
                        properties:
                          exit_code:
                            description: The command's own exit code (not the UAPI call's success/failure).
                            example: 0
                            type: integer
                          stderr:
                            description: Captured standard error.
                            example: ''
                            type: string
                          stderr_truncated:
                            description: True if stderr was cut off at the output size cap.
                            example: false
                            type: boolean
                          stdout:
                            description: Captured standard output.
                            example: 'Mon Jan  1 00:00:00 UTC 2026

                              '
                            type: string
                          stdout_truncated:
                            description: True if stdout was cut off at the output size cap.
                            example: false
                            type: boolean
                        type: object
                      errors:
                        description: List of errors if the API failed.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      messages:
                        description: List of messages generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      metadata:
                        properties: {}
                        type: object
                      status:
                        description: '* 1 - Success.

                          * 0 - Failed. Check the `errors` field for more details.'
                        enum:
                        - 0
                        - 1
                        example: 1
                        type: integer
                      warnings:
                        description: List of warnings generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                    type: object
                type: object
          description: HTTP Request was successful.
      summary: Run a one-shot command inside an ea-podman container
      tags:
      - EAPodman
      - ea-podman Containers
      x-codeSamples:
      - label: CLI
        lang: Shell
        source: "uapi --output=jsonpretty \\\n  --user=username \\\n  EAPodman \\\n  cmd \\\n  container_name='myredis.bob.01'\
          \ \\\n  arg='date'\n"
      - label: URL
        lang: HTTP
        source: https://hostname.example.com:2083/cpsess##########/execute/EAPodman/cmd?container_name=myredis.bob.01&arg=date
      - label: LiveAPI Perl
        lang: Perl
        source: "use strict;\nuse Cpanel::LiveAPI ();\n\nmy $cpanel = Cpanel::LiveAPI->new();\n\nprint\
          \ \"Content-type: text/plain\\r\\n\\r\\n\";\n\nmy $response = $cpanel->uapi(\n        q/EAPodman/,\n\
          \        q/cmd/,\n        {\n            'container_name' => 'myredis.bob.01',\n           \
          \ 'arg' => 'date',\n        }\n);\n\nif ($response->{cpanelresult}{result}{status}) {\n    print\
          \ to_json($response->{cpanelresult}{result}{data});\n}\nelse {\n    print to_json($response->{cpanelresult}{result}{errors});\n\
          }\n\n$cpanel->end();\n\nsub to_json { require JSON; return JSON->new->pretty->encode($_[0]);\
          \ }\n"
      - label: LiveAPI PHP
        lang: PHP
        source: "<?php\nrequire_once \"/usr/local/cpanel/php/cpanel.php\";\nheader('Content-Type: text/plain');\n\
          $cpanel = new CPANEL();\n\n$response = $cpanel->uapi(\n        'EAPodman',\n        'cmd',\n\
          \        array (\n            'container_name' => 'myredis.bob.01',\n            'arg' => 'date',\n\
          \        )\n);\n\nif ($response['cpanelresult']['result']['status']) {\n    print to_json($response['cpanelresult']['result']['data']);\n\
          }\nelse {\n    print to_json($response['cpanelresult']['result']['errors']);\n}\n\n$cpanel->end();\n\
          \nfunction to_json($data) { return json_encode($data, JSON_PRETTY_PRINT); }\n"
      x-cpanel-api-version: UAPI
      x-cpanel-available-version: ea-podman 1.0
      x-readonly: false
security:
- BasicAuth: []
servers:
- description: A server running cPanel.
  url: https://{host}:{port}/execute
  variables:
    host:
      default: cpanel-server.tld
      description: The hostname of a server running cPanel
    port:
      default: '2083'
      description: The cPanel port.
tags:
- description: The EAPodman module for UAPI.
  name: EAPodman
- description: Optional Applications / ea-podman Containers
  name: ea-podman Containers
x-tagGroups:
- name: Optional Applications
  tags:
  - ea-podman Containers
