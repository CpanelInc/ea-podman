---
components:
  schemas: {}
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
externalDocs:
  url: https://cpanel.net/developers/
info:
  contact:
    email: cs@cpanel.net
    name: WebPros International, LLC
    url: https://cpanel.net/support/
  description: UAPI accesses the cPanel interface's features. Use this API to access and modify cPanel
    account data and settings.
  license:
    name: cPanel License
    url: https://cpanel.net/legal-notices/
  termsOfService: https://cpanel.net/legal-notices/
  title: cPanel UAPI
  version: 11.136.0.0
openapi: 3.0.2
paths:
  /EAPodman/status:
    get:
      description: Report the named container's systemd user-service state (running/enabled). Read-only.
      operationId: status
      parameters:
      - description: The generated name of the container to act on.
        in: query
        name: container_name
        required: true
        schema:
          example: myredis.bob.01
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  apiversion:
                    description: The version of the API.
                    example: 3
                    type: integer
                  func:
                    description: The name of the method called.
                    type: string
                  module:
                    description: The name of the module called.
                    example: EAPodman
                    type: string
                  result:
                    properties:
                      data:
                        description: The container's systemd user-service state.
                        example:
                          enabled: 1
                          running: 1
                        properties:
                          enabled:
                            description: 1 if the service is enabled.
                            enum:
                            - 0
                            - 1
                            example: 1
                            type: integer
                          running:
                            description: 1 if the service is active.
                            enum:
                            - 0
                            - 1
                            example: 1
                            type: integer
                        type: object
                      errors:
                        description: List of errors if the API failed.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      messages:
                        description: List of messages generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                      metadata:
                        properties: {}
                        type: object
                      status:
                        description: '* 1 - Success.

                          * 0 - Failed. Check the `errors` field for more details.'
                        enum:
                        - 0
                        - 1
                        example: 1
                        type: integer
                      warnings:
                        description: List of warnings generated by the API.
                        example: null
                        items:
                          type: string
                        nullable: true
                        type: array
                    type: object
                type: object
          description: HTTP Request was successful.
      summary: Report an ea-podman container's state
      tags:
      - EAPodman
      - ea-podman Containers
      x-codeSamples:
      - label: CLI
        lang: Shell
        source: "uapi --output=jsonpretty \\\n  --user=username \\\n  EAPodman \\\n  status \\\n  container_name='myredis.bob.01'\n"
      - label: URL
        lang: HTTP
        source: https://hostname.example.com:2083/cpsess##########/execute/EAPodman/status?container_name=myredis.bob.01
      - label: LiveAPI Perl
        lang: Perl
        source: "use strict;\nuse Cpanel::LiveAPI ();\n\nmy $cpanel = Cpanel::LiveAPI->new();\n\nprint\
          \ \"Content-type: text/plain\\r\\n\\r\\n\";\n\nmy $response = $cpanel->uapi(\n        q/EAPodman/,\n\
          \        q/status/,\n        {\n            'container_name' => 'myredis.bob.01',\n        }\n\
          );\n\nif ($response->{cpanelresult}{result}{status}) {\n    print to_json($response->{cpanelresult}{result}{data});\n\
          }\nelse {\n    print to_json($response->{cpanelresult}{result}{errors});\n}\n\n$cpanel->end();\n\
          \nsub to_json { require JSON; return JSON->new->pretty->encode($_[0]); }\n"
      - label: LiveAPI PHP
        lang: PHP
        source: "<?php\nrequire_once \"/usr/local/cpanel/php/cpanel.php\";\nheader('Content-Type: text/plain');\n\
          $cpanel = new CPANEL();\n\n$response = $cpanel->uapi(\n        'EAPodman',\n        'status',\n\
          \        array (\n            'container_name' => 'myredis.bob.01',\n        )\n);\n\nif ($response['cpanelresult']['result']['status'])\
          \ {\n    print to_json($response['cpanelresult']['result']['data']);\n}\nelse {\n    print to_json($response['cpanelresult']['result']['errors']);\n\
          }\n\n$cpanel->end();\n\nfunction to_json($data) { return json_encode($data, JSON_PRETTY_PRINT);\
          \ }\n"
      x-cpanel-api-version: UAPI
      x-cpanel-available-version: ea-podman 1.0
      x-readonly: true
security:
- BasicAuth: []
servers:
- description: A server running cPanel.
  url: https://{host}:{port}/execute
  variables:
    host:
      default: cpanel-server.tld
      description: The hostname of a server running cPanel
    port:
      default: '2083'
      description: The cPanel port.
tags:
- description: The EAPodman module for UAPI.
  name: EAPodman
- description: Optional Applications / ea-podman Containers
  name: ea-podman Containers
x-tagGroups:
- name: Optional Applications
  tags:
  - ea-podman Containers
